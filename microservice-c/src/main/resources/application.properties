quarkus.application.name=fms-penalty-engine
quarkus.http.port=8082
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
mp.messaging.incoming.car-heartbeats.connector=smallrye-kafka
mp.messaging.incoming.car-heartbeats.topic=fms.car.heartbeats
mp.messaging.incoming.car-heartbeats.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.car-heartbeats.group.id=fms-penalty-group
mp.messaging.incoming.car-heartbeats.auto.offset.reset=latest
quarkus.redis.hosts=${QUARKUS_REDIS_HOSTS:redis://localhost:6379}
# CAR thresholds (km/h | points/km)
penalty.car.mild.speed=60.0
penalty.car.mild.points=2
penalty.car.severe.speed=80.0
penalty.car.severe.points=5
# TRUCK thresholds
penalty.truck.mild.speed=50.0
penalty.truck.mild.points=3
penalty.truck.severe.speed=70.0
penalty.truck.severe.points=8
# AIRCRAFT thresholds (in knots — engine converts internally)
penalty.aircraft.mild.knots=200.0
penalty.aircraft.mild.points=4
penalty.aircraft.severe.knots=250.0
penalty.aircraft.severe.points=10
# SHIP thresholds (km/h)
penalty.ship.mild.speed=20.0
penalty.ship.mild.points=2
penalty.ship.severe.speed=30.0
penalty.ship.severe.points=6
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
quarkus.log.level=INFO
