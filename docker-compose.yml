version: '3.8'
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: fms-postgres
    environment:
      POSTGRES_DB: fms_db
      POSTGRES_USER: fms_user
      POSTGRES_PASSWORD: fms_pass
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U fms_user -d fms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: fms-redis
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD","bash","-c","echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fms-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: ["9092:9092","29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD","kafka-topics","--bootstrap-server","localhost:9092","--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fms-kafka-ui
    depends_on: [kafka]
    ports: ["8090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: fms-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  microservice-a:
    build: {context: ./microservice-a, dockerfile: Dockerfile}
    container_name: fms-api
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    ports: ["8080:8080"]
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/fms_db
      QUARKUS_DATASOURCE_USERNAME: fms_user
      QUARKUS_DATASOURCE_PASSWORD: fms_pass
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    healthcheck:
      test: ["CMD-SHELL","wget -q --spider http://localhost:8080/q/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  microservice-b:
    build: {context: ./microservice-b, dockerfile: Dockerfile}
    container_name: fms-simulator
    depends_on:
      kafka: {condition: service_healthy}
      microservice-a: {condition: service_healthy}
    ports: ["8081:8081"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  microservice-c:
    build: {context: ./microservice-c, dockerfile: Dockerfile}
    container_name: fms-penalty
    depends_on:
      kafka: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["8082:8082"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      QUARKUS_REDIS_HOSTS: redis://redis:6379

volumes:
  postgres_data:
  redis_data:
